name: Build PostgreSQL Client Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
permissions:
  contents: write   # 🔹 necesario para crear releases
jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Download PostgreSQL client 16 (Debian package)
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt noble-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          apt-get download postgresql-client-16
          dpkg -x postgresql-client-16*.deb ./pg16-linux
          ls -R ./pg16-linux
          tar -czf pg16-linux-clean.tar.gz -C ./pg16-linux/usr/lib/postgresql/16 bin lib
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pg16-linux-clean.tar.gz
          path: .

  windows:
    runs-on: windows-latest
    steps:
      - name: Download PostgreSQL client 16 (Windows binaries)
        run: |
          curl -L -o pg16-win.zip https://get.enterprisedb.com/postgresql/postgresql-16.3-1-windows-x64-binaries.zip
          mkdir pg16-win
          unzip pg16-win.zip "pgsql/bin/*" -d pg16-win
          # Empaquetar solo la carpeta bin
          tar -czf pg16-win-bin.tar.gz -C pg16-win/pgsql bin
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pg16-win-bin.tar.gz
          path: .

  release:
    needs: [linux, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pg16-win-bin.tar.gz
            dist/pg16-linux-clean.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
